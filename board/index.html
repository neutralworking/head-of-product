<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HoP board</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>HoP board</h1>
    <div id="meta">loading…</div>
  </header>

  <main>
    <section id="projects-panel" class="panel">
      <h2>Active projects</h2>
      <div id="projects" class="cards"></div>
    </section>

    <section id="revenue-panel" class="panel">
      <h2>Revenue snapshot</h2>
      <div class="table-wrap">
        <table id="revenue">
          <thead>
            <tr>
              <th scope="col">Project</th>
              <th scope="col">£ / month</th>
              <th scope="col">Trajectory</th>
              <th scope="col">Cost / month</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="opportunities-panel" class="panel">
      <h2>Top opportunities</h2>
      <ol id="opportunities"></ol>
    </section>
  </main>

  <footer>
    <small>Source: <code>board/data.json</code> · regenerated by HoP</small>
  </footer>

  <script src="board.js"></script>
</body>
</html>
